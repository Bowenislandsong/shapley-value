# Publish wheel + sdist to PyPI.
#
# Automatic: push a version tag (e.g. git tag v0.0.9 && git push origin v0.0.9).
#   No GitHub "Release" page required — the tag push triggers this workflow.
#
# Manual: Actions → Publish to PyPI → Run workflow → set `ref` (e.g. v0.0.8).
#
# Optional: still create a GitHub Release for changelog/artifacts; it does not
# run this workflow (avoids duplicate PyPI uploads when both tag + release fire).
#
# Requires repo secret: PYPI_API_TOKEN

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (use a release tag, e.g. v0.0.8)"
        required: true
        type: string
        default: "main"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify package version matches tag
        if: >-
          startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && startsWith(inputs.ref, 'v'))
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
        run: |
          python << 'PY'
          import os, re, pathlib
          tag = os.environ["TAG_NAME"].lstrip("vV")
          text = pathlib.Path("shapley_value/__init__.py").read_text()
          m = re.search(r"__version__\s*=\s*['\"]([^'\"]+)['\"]", text)
          if not m:
              raise SystemExit("Could not parse __version__ in shapley_value/__init__.py")
          ver = m.group(1)
          if ver != tag:
              raise SystemExit(
                  f"Version mismatch: git tag expects {tag!r} but __version__ is {ver!r}. "
                  "Bump the version in shapley_value/__init__.py (and changelog) before tagging."
              )
          print(f"OK: __version__ {ver} matches tag {os.environ['TAG_NAME']}")
          PY

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
